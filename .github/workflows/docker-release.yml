name: Docker Release

# A release fires two runs (the `release` event + the `push` of the version-bump
# commit to master). Both export to the same GHA cache scope and push the same
# `sha` tag, which races and intermittently fails one of them. Serialize them so
# the second run waits and reuses the first run's warm cache instead of racing it.
#
# `queue: max` is required: with the default `queue: single` only ONE run may be
# pending per group, so when both runs pile up behind an in-progress one GitHub
# CANCELS the older pending run instead of queueing it. That casualty was the
# `release` run (the only one producing the `latest`/semver tags), which is why
# `latest` went stale while `master` kept updating. `queue: max` queues up to 100
# runs FIFO so neither is dropped. (cancel-in-progress must stay false.)
concurrency:
  group: docker-release
  cancel-in-progress: false
  queue: max

on:
  push:
    branches:
      - master
    tags-ignore: # prevents to run duplicated on releases
      - '**'
  release:
    types:
      - created

jobs:
  build-push:
    permissions:
      packages: write
      contents: read

    runs-on: ubuntu-latest
    steps:
      - uses: catchpoint/workflow-telemetry-action@v1
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3

      - name: Login to dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to Github Packages
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Docker Meta
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: zwavejs/zwave-js-ui,ghcr.io/zwave-js/zwave-js-ui
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=ref,event=branch
          labels: |
            org.opencontainers.image.vendor=zwave-js
            org.opencontainers.image.documentation=https://zwave-js.github.io/zwave-js-ui
            org.opencontainers.image.authors=Daniel Lando <daniel.sorridi@gmail.com>
            maintainer=robertsLando

      - name: Create Docker Meta for zwavejs2mqtt
        id: docker_meta2
        uses: docker/metadata-action@v5
        with:
          images: zwavejs/zwavejs2mqtt
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=ref,event=branch
          labels: |
            org.opencontainers.image.vendor=zwave-js
            org.opencontainers.image.documentation=https://zwave-js.github.io/zwave-js-ui
            org.opencontainers.image.authors=Daniel Lando <daniel.sorridi@gmail.com>
            maintainer=robertsLando

      - name: build+push
        timeout-minutes: 120 # prevents this to run indeterminately
        uses: docker/build-push-action@v6
        with:
          platforms: linux/arm64,linux/amd64,linux/arm/v7,linux/arm/v6
          file: docker/Dockerfile
          context: . # without this it will clone master branch instead of using local
          cache-from: type=gha,scope=zwave-js-ui
          cache-to: type=gha,mode=max,scope=zwave-js-ui
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}

      - name: build+push zwavejs2mqtt
        timeout-minutes: 120
        uses: docker/build-push-action@v6
        with:
          platforms: linux/arm64,linux/amd64,linux/arm/v7,linux/arm/v6
          file: docker/Dockerfile
          context: . # without this it will clone master branch instead of using local
          cache-from: |
            type=gha,scope=zwavejs2mqtt
            type=gha,scope=zwave-js-ui
          build-args: |
            image=zwavejs2mqtt
          cache-to: type=gha,mode=max,scope=zwavejs2mqtt
          push: true
          tags: ${{ steps.docker_meta2.outputs.tags }}
          labels: ${{ steps.docker_meta2.outputs.labels }}
