name: 'Z-Wave Bot: react to Issues/Discussions'

on:
  issues:
    types: [opened, edited]
  discussion:
    types: [created, edited]

# Serialize runs for the same issue/discussion so an "edited" event
# firing while an "opened" run is still in flight can't race it (e.g.
# duplicate answers, or an edit's answer landing before the original
# post's). Never cancel a run in progress - a cancelled bot reply job
# could leave a half-posted comment or a missed suppression update.
concurrency:
  group: zwave-js-bot-post-${{ github.event_name }}-${{ github.event.issue.number || github.event.discussion.number }}
  cancel-in-progress: false

jobs:
  # Notify issue author when they post in the wrong repository
  check-issue-repo:
    runs-on: [ubuntu-latest]
    if: github.event_name == 'issues'

    steps:
    - name: Checkout master branch
      uses: actions/checkout@v7

    - name: Classify issue body using AI
      id: ai_detection
      uses: actions/ai-inference@v2.1.1
      with:
        model: openai/gpt-4o-mini

        system-prompt: |
          You are a moderator for the Z-Wave JS UI Github repository. Your goal is to assist users with finding the correct repository to report their issues.

          Analyze the issue description and determine whether it:
          - is likely related to the UI, like visual bugs, mentions of UI elements, some functionality is not exposed, ...
          - or refers to more low-level issues like problems communicating with devices or the controller, incorrect device behavior, mentions hardware issues, ...

          If you are uncertain (less than 75% confident), reply with "unknown"
          If the issue is related to the UI, reply with "UI"
          If the issue is more low-level, reply with "driver"
          Do not respond with anything else.

        prompt: |
          Analyze the following issue description and classify it according to the rules above:

          ```
          ${{ github.event.issue.body }}
          ```

        max-tokens: 100

    - name: Give feedback
      uses: actions/github-script@v9
      id: feedback
      env:
        AI_RESPONSE: ${{ steps.ai_detection.outputs.response }}
      with:
        github-token: ${{secrets.BOT_TOKEN}}
        result-encoding: string
        script: |
          const aiResponse = process.env.AI_RESPONSE;
          console.log('Raw AI response:', JSON.stringify(aiResponse));

          const bot = require(`${process.env.GITHUB_WORKSPACE}/.github/bot-scripts/index.cjs`);
          return bot.classifyIssueFeedback({github, context}, aiResponse);

  # Answer questions that are covered by the documentation and/or
  # suggest similar existing posts. Discussions are restricted to the
  # Q&A category by answerFromDocs.cjs itself. Excluding maintainers
  # and the bot's own posts is handled entirely inside answerFromDocs.cjs
  # (EXCLUDED_USERS, derived from authorizedUsers.cjs) so that list has
  # a single source of truth instead of being duplicated here.
  answer-from-docs:
    runs-on: [ubuntu-latest]
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      issues: write
      models: read

    steps:
    - name: Checkout master branch
      uses: actions/checkout@v7

    - name: Restore docs index
      id: docs-index
      uses: ./.github/actions/restore-bot-index
      with:
        index: docs
        github-token: ${{ github.token }}

    - name: Restore posts index
      id: posts-index
      uses: ./.github/actions/restore-bot-index
      with:
        index: posts
        github-token: ${{ github.token }}

    # Downvoted answers collected by the docs-embeddings workflow.
    # A missing cache just means no suppression is applied, so unlike the
    # indexes this one deliberately has no artifact fallback.
    - name: Restore answer feedback
      uses: actions/cache/restore@v6
      with:
        path: .docs-feedback/feedback.json
        key: docs-feedback-v1-
        restore-keys: |
          docs-feedback-v1-

    # One missing index still answers, just worse - say so instead of
    # letting a half-working bot look healthy
    - name: Warn about a partial outage
      if: |
        (steps.docs-index.outputs.found == 'true') !=
        (steps.posts-index.outputs.found == 'true')
      run: |
        echo "::warning::Only one of the two indexes was restored (docs: ${{ steps.docs-index.outputs.found }}, posts: ${{ steps.posts-index.outputs.found }}) - answers will be degraded"

    # This workflow is triggered by whoever opened the issue or discussion, so
    # a failed run notifies them, not the maintainers. Route the outage to the
    # same tracking issue the nightly evaluations use, and let a later healthy
    # run close it again.
    - name: Track index availability
      # Reporting the outage must never be what breaks the run
      continue-on-error: true
      uses: actions/github-script@v9
      env:
        TRACKING_ISSUE_TITLE: "🚨 Answer bot cannot restore its search index"
        EVAL_NAME: answer bot index restore
        EVAL_OUTCOME: ${{ (steps.docs-index.outputs.found != 'true' && steps.posts-index.outputs.found != 'true') && 'failure' || 'success' }}
        TRACKING_ISSUE_BODY: |
          Neither the docs index nor the posts index could be restored - not from the Actions cache, and not from the latest artifact of the embeddings workflows. The answer bot cannot run until this is fixed.

          Check that `docs-embeddings.yml` and `posts-embeddings.yml` are still succeeding and still uploading their `docs-index` / `posts-index` artifacts.
        # Fires once per new issue or discussion, so an open outage must not
        # collect a comment every time
        TRACKING_ISSUE_QUIET: 'true'
      with:
        script: |
          const bot = require(`${process.env.GITHUB_WORKSPACE}/.github/bot-scripts/index.cjs`);
          await bot.updateEvalTrackingIssue({github, context});

    - name: Fail if neither index is available
      # Both the cache entry and the newest unexpired artifact would have to be
      # missing for this to fire. Failing the job keeps a permanently broken
      # bot from reporting green run after run.
      if: steps.docs-index.outputs.found != 'true' && steps.posts-index.outputs.found != 'true'
      run: |
        echo "::error::Neither the docs index nor the posts index could be restored, from cache or from artifacts - the answer bot cannot run"
        exit 1

    - name: Answer from documentation
      uses: actions/github-script@v9
      env:
        MODELS_TOKEN: ${{ github.token }}
        DOCS_INDEX_PATH: .docs-index/index.json
        POSTS_INDEX_PATH: .posts-index/index.json
        DOCS_FEEDBACK_PATH: .docs-feedback/feedback.json
      with:
        github-token: ${{ secrets.BOT_TOKEN }}
        script: |
          const bot = require(`${process.env.GITHUB_WORKSPACE}/.github/bot-scripts/index.cjs`);
          await bot.answerFromDocs({github, context});

  # Add the new post to the posts index, so it can be suggested as a
  # related post before the next nightly rebuild. Discussions outside
  # the Q&A category are ignored by updatePostsIndex.cjs itself.
  # Edits are reconciled by the nightly rebuild instead, so repeated
  # edits cannot burn Models API requests and cache storage.
  update-posts-index:
    runs-on: [ubuntu-latest]
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      models: read
    if: github.event.action == 'opened' || github.event.action == 'created'

    steps:
    - name: Checkout master branch
      uses: actions/checkout@v7

    # Restoring from the artifact and re-saving the cache below is also how an
    # evicted cache entry heals itself between two nightly rebuilds
    - name: Restore posts index
      id: posts-index
      uses: ./.github/actions/restore-bot-index
      with:
        index: posts
        github-token: ${{ github.token }}

    - name: Warn if no posts index is available
      # Only a warning: this append is best effort, the 04:30 rebuild picks the
      # post up either way. answer-from-docs is where an outage is worth a red
      # run - failing here too would just paint every community post red for
      # something that self-corrects.
      if: steps.posts-index.outputs.found != 'true'
      run: |
        echo "::warning::The posts index could not be restored, from cache or from artifacts - this post will only be indexed by the next nightly rebuild"

    - name: Add post to index
      id: update
      if: steps.posts-index.outputs.found == 'true'
      uses: actions/github-script@v9
      env:
        MODELS_TOKEN: ${{ github.token }}
        POSTS_INDEX_PATH: .posts-index/index.json
      with:
        script: |
          const bot = require(`${process.env.GITHUB_WORKSPACE}/.github/bot-scripts/index.cjs`);
          return bot.updatePostsIndex({github, context});

    - name: Save posts index
      if: steps.update.outputs.result == 'true'
      uses: actions/cache/save@v6
      with:
        path: .posts-index
        key: posts-embeddings-v1-${{ github.run_id }}
