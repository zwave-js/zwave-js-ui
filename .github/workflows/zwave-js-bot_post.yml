name: 'Z-Wave Bot: react to Issues/Discussions'

on:
  issues:
    types: [opened, edited]
  discussion:
    types: [created, edited]

# Serialize runs for the same issue/discussion so an "edited" event
# firing while an "opened" run is still in flight can't race it (e.g.
# duplicate answers, or an edit's answer landing before the original
# post's). Never cancel a run in progress - a cancelled bot reply job
# could leave a half-posted comment or a missed suppression update.
concurrency:
  group: zwave-js-bot-post-${{ github.event_name }}-${{ github.event.issue.number || github.event.discussion.number }}
  cancel-in-progress: false

jobs:
  # Notify issue author when they post in the wrong repository
  check-issue-repo:
    runs-on: [ubuntu-latest]
    if: github.event_name == 'issues'

    steps:
    - name: Checkout master branch
      uses: actions/checkout@v7

    - name: Classify issue body using AI
      id: ai_detection
      uses: actions/ai-inference@v2.1.1
      with:
        model: openai/gpt-4o-mini

        system-prompt: |
          You are a moderator for the Z-Wave JS UI Github repository. Your goal is to assist users with finding the correct repository to report their issues.

          Analyze the issue description and determine whether it:
          - is likely related to the UI, like visual bugs, mentions of UI elements, some functionality is not exposed, ...
          - or refers to more low-level issues like problems communicating with devices or the controller, incorrect device behavior, mentions hardware issues, ...

          If you are uncertain (less than 75% confident), reply with "unknown"
          If the issue is related to the UI, reply with "UI"
          If the issue is more low-level, reply with "driver"
          Do not respond with anything else.

        prompt: |
          Analyze the following issue description and classify it according to the rules above:

          ```
          ${{ github.event.issue.body }}
          ```

        max-tokens: 100

    - name: Give feedback
      uses: actions/github-script@v9
      id: feedback
      env:
        AI_RESPONSE: ${{ steps.ai_detection.outputs.response }}
      with:
        github-token: ${{secrets.BOT_TOKEN}}
        result-encoding: string
        script: |
          const aiResponse = process.env.AI_RESPONSE;
          console.log('Raw AI response:', JSON.stringify(aiResponse));

          const bot = require(`${process.env.GITHUB_WORKSPACE}/.github/bot-scripts/index.cjs`);
          return bot.classifyIssueFeedback({github, context}, aiResponse);

  # Answer questions that are covered by the documentation and/or
  # suggest similar existing posts. Discussions are restricted to the
  # Q&A category by answerFromDocs.cjs itself. Excluding maintainers
  # and the bot's own posts is handled entirely inside answerFromDocs.cjs
  # (EXCLUDED_USERS, derived from authorizedUsers.cjs) so that list has
  # a single source of truth instead of being duplicated here.
  answer-from-docs:
    runs-on: [ubuntu-latest]
    timeout-minutes: 10
    permissions:
      contents: read
      models: read

    steps:
    - name: Checkout master branch
      uses: actions/checkout@v7

    - name: Restore docs index
      id: restore-index
      uses: actions/cache/restore@v6
      with:
        path: .docs-index
        key: docs-embeddings-v2-${{ hashFiles('docs/**/*.md', '.github/bot-scripts/buildDocsIndex.cjs', '.github/bot-scripts/docsIndex.cjs', '.github/bot-scripts/modelsApi.cjs') }}
        restore-keys: |
          docs-embeddings-v2-

    - name: Restore posts index
      id: restore-posts-index
      uses: actions/cache/restore@v6
      with:
        path: .posts-index
        # There is no exact key to match, the newest index is picked
        # via the prefix
        key: posts-embeddings-v1-
        restore-keys: |
          posts-embeddings-v1-

    # Downvoted answers collected by the docs-embeddings workflow.
    # A missing cache just means no suppression is applied.
    - name: Restore answer feedback
      uses: actions/cache/restore@v6
      with:
        path: .docs-feedback/feedback.json
        key: docs-feedback-v1-
        restore-keys: |
          docs-feedback-v1-

    - name: Warn if neither index is available
      if: steps.restore-index.outputs.cache-matched-key == '' && steps.restore-posts-index.outputs.cache-matched-key == ''
      uses: actions/github-script@v9
      with:
        script: |
          core.warning('Neither the docs index nor the posts index cache is available yet - skipping the docs answer bot for this post. This is expected until the first docs-embeddings/posts-embeddings workflow run has completed.');

    - name: Answer from documentation
      if: steps.restore-index.outputs.cache-matched-key != '' || steps.restore-posts-index.outputs.cache-matched-key != ''
      uses: actions/github-script@v9
      env:
        MODELS_TOKEN: ${{ github.token }}
        DOCS_INDEX_PATH: .docs-index/index.json
        POSTS_INDEX_PATH: .posts-index/index.json
        DOCS_FEEDBACK_PATH: .docs-feedback/feedback.json
      with:
        github-token: ${{ secrets.BOT_TOKEN }}
        script: |
          const bot = require(`${process.env.GITHUB_WORKSPACE}/.github/bot-scripts/index.cjs`);
          await bot.answerFromDocs({github, context});

  # Add the new post to the posts index, so it can be suggested as a
  # related post before the next nightly rebuild. Discussions outside
  # the Q&A category are ignored by updatePostsIndex.cjs itself.
  # Edits are reconciled by the nightly rebuild instead, so repeated
  # edits cannot burn Models API requests and cache storage.
  update-posts-index:
    runs-on: [ubuntu-latest]
    timeout-minutes: 10
    permissions:
      contents: read
      models: read
    if: github.event.action == 'opened' || github.event.action == 'created'

    steps:
    - name: Checkout master branch
      uses: actions/checkout@v7

    - name: Restore posts index
      id: restore-posts-index
      uses: actions/cache/restore@v6
      with:
        path: .posts-index
        # There is no exact key to match, the newest index is picked
        # via the prefix
        key: posts-embeddings-v1-
        restore-keys: |
          posts-embeddings-v1-

    - name: Warn if no posts index is available
      if: steps.restore-posts-index.outputs.cache-matched-key == ''
      uses: actions/github-script@v9
      with:
        script: |
          core.warning('No posts index cache is available yet - skipping the incremental posts index update for this post. This is expected until the first posts-embeddings workflow run has completed.');

    - name: Add post to index
      id: update
      if: steps.restore-posts-index.outputs.cache-matched-key != ''
      uses: actions/github-script@v9
      env:
        MODELS_TOKEN: ${{ github.token }}
        POSTS_INDEX_PATH: .posts-index/index.json
      with:
        script: |
          const bot = require(`${process.env.GITHUB_WORKSPACE}/.github/bot-scripts/index.cjs`);
          return bot.updatePostsIndex({github, context});

    - name: Save posts index
      if: steps.update.outputs.result == 'true'
      uses: actions/cache/save@v6
      with:
        path: .posts-index
        key: posts-embeddings-v1-${{ github.run_id }}
