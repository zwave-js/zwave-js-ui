name: Build posts embeddings index

# Builds and caches a semantic search index over issues and discussions,
# used by the bot to suggest related/duplicate posts.
# Between the nightly rebuilds, new posts are appended incrementally by
# the update-posts-index job in the issue/discussion bot workflow.

on:
  schedule:
    # Nightly, reconciles closed/edited posts and any appends that were
    # lost to concurrent cache saves
    - cron: '30 4 * * *'
  push:
    branches: [master]
    paths:
      - '.github/bot-scripts/buildPostsIndex.cjs'
      - '.github/bot-scripts/postsIndex.cjs'
      - '.github/bot-scripts/modelsApi.cjs'
      - '.github/bot-scripts/githubApi.cjs'
      - '.github/bot-scripts/evalRelatedPosts.cjs'
      - '.github/bot-scripts/evalUtils.cjs'
      - '.github/bot-scripts/relatedPostsEvalCases.json'
      - '.github/bot-scripts/updateEvalTrackingIssue.cjs'
      - '.github/workflows/posts-embeddings.yml'
  workflow_dispatch:

permissions:
  contents: read
  models: read
  issues: read
  discussions: read

jobs:
  build-index:
    runs-on: [ubuntu-latest]
    timeout-minutes: 20

    steps:
    - name: Checkout master branch
      uses: actions/checkout@v7

    # Cache keys are immutable, so the rolling index is always saved under
    # a fresh run-scoped key and restored via the newest prefix match.
    # The explicit restore/save split ensures a failed build does not
    # re-save a stale index under a new key.
    - name: Restore previous index
      uses: actions/cache/restore@v6
      with:
        path: .posts-index
        # There is no exact key to match, the newest index is picked
        # via the prefix
        key: posts-embeddings-v1-
        restore-keys: |
          posts-embeddings-v1-

    - name: Build index
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: node .github/bot-scripts/buildPostsIndex.cjs ${{ github.repository }} .posts-index/index.json

    - name: Save index
      uses: actions/cache/save@v6
      with:
        path: .posts-index
        key: posts-embeddings-v1-${{ github.run_id }}

    # The cache entry is regularly evicted before the answer bot gets to use it
    # (the repository cache is capped and evicted least-recently-used), so keep
    # a durable copy it can fall back to.
    - name: Upload index artifact
      uses: actions/upload-artifact@v7
      with:
        name: posts-index
        path: .posts-index
        retention-days: 30
        # .posts-index is a dot-directory and the glob skips hidden entries by
        # default, search root included - without this the upload matches zero
        # files and silently produces no artifact at all
        include-hidden-files: true
        # The answer bot depends on this artifact existing, so an empty upload
        # is a failure, not a warning
        if-no-files-found: error

  evaluate:
    needs: build-index
    runs-on: [ubuntu-latest]
    timeout-minutes: 15
    permissions:
      contents: read
      models: read
      issues: write

    steps:
    - name: Checkout master branch
      uses: actions/checkout@v7

    - name: Restore posts index
      id: restore-index
      uses: actions/cache/restore@v6
      with:
        path: .posts-index
        key: posts-embeddings-v1-${{ github.run_id }}

    - name: Fail if posts index is missing
      # build-index should always have just saved this exact run-scoped
      # cache entry; surface the problem loudly instead of silently
      # skipping the evaluation and reporting green
      if: steps.restore-index.outputs.cache-hit != 'true'
      run: |
        echo "::error::Posts index cache miss after build-index - cannot evaluate retrieval quality"
        exit 1

    - name: Evaluate retrieval quality
      id: eval
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: node .github/bot-scripts/evalRelatedPosts.cjs .posts-index/index.json

    - name: Update tracking issue
      uses: actions/github-script@v9
      env:
        TRACKING_ISSUE_TITLE: "🚨 Related posts bot retrieval quality regression"
        EVAL_NAME: related posts bot
        EVAL_OUTCOME: ${{ steps.eval.outcome }}
        EVAL_SUMMARY: ${{ steps.eval.outputs.summary }}
      with:
        script: |
          const bot = require(`${process.env.GITHUB_WORKSPACE}/.github/bot-scripts/index.cjs`);
          await bot.updateEvalTrackingIssue({github, context});
